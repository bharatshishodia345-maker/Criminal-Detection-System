<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Criminal | SecureSight AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-box{
            width:600px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            font-weight:bold;
            color:#0f172a;
            margin-bottom:25px;
        }

        .icon{
            font-size:60px;
            text-align:center;
            margin-bottom:10px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:bold;
            border-radius:10px;
        }

        .form-control{
            padding:12px;
        }

    </style>

</head>

<body>

<div class="card-box">

    <div class="icon">
        🚨
    </div>

    <h2 class="title">
        Add Criminal Record
    </h2>

    <form method="POST"
          enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label">
                Criminal Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter Criminal Name"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Upload Criminal Images
            </label>

            <input
                type="file"
                name="images"
                class="form-control"
                multiple
                required>

        </div>

        <button
            type="submit"
            class="btn btn-danger btn-custom">

            ➕ Add Criminal

        </button>

    </form>

    <hr>

    <div class="text-center">

        <a href="/criminal_database"
           class="btn btn-secondary">

            ⬅ Back to Database

        </a>

    </div>

</div>

</body>
</html>
