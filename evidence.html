<!DOCTYPE html>
<html>
<head>

<title>Evidence Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>📷 Evidence Gallery</h1>

<hr>

<h3 class="text-danger">
🚨 Criminal Alerts
</h3>

<div class="row">

{% for img in alert_images %}

<div class="col-md-3 mb-3">

<div class="card">

<img
src="/static/evidence/alert/{{ img }}"
class="card-img-top">

</div>

</div>

{% endfor %}

</div>

<hr>

<h3 class="text-warning">
⚠ Unknown Persons
</h3>

<div class="row">

{% for img in suspicious_images %}

<div class="col-md-3 mb-3">

<div class="card">

<img
src="/static/evidence/suspicious/{{ img }}"
class="card-img-top">

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
